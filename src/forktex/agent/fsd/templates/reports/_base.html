<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}FORKTEX Report{% endblock %}</title>
<style>
  @page { size: A4; margin: 2cm; }
  :root { --primary:#2a7fc1; --success:#3fb950; --warn:#d29922; --danger:#f85149; --muted:#6e7781;
          --bg:#ffffff; --surface:#f6f8fa; --border:#d0d7de; --text:#1f2328; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',-apple-system,sans-serif; color:var(--text); line-height:1.6; background:var(--bg); padding:2rem; max-width:210mm; margin:0 auto; }
  h1 { font-size:1.5rem; margin-bottom:.25rem; color:var(--primary); }
  h2 { font-size:1.15rem; color:var(--text); margin:1.5rem 0 .5rem; padding-bottom:.25rem; border-bottom:2px solid var(--border); }
  h3 { font-size:.95rem; margin:1rem 0 .4rem; }
  p { margin-bottom:.5rem; color:var(--muted); font-size:.9rem; }
  code { font-family:'JetBrains Mono',monospace; font-size:.85em; background:var(--surface); padding:.1em .3em; border-radius:3px; }
  table { width:100%; border-collapse:collapse; margin:.5rem 0; font-size:.85rem; }
  th { background:var(--surface); text-align:left; padding:.4rem .6rem; font-weight:600; border-bottom:2px solid var(--border); }
  td { padding:.35rem .6rem; border-bottom:1px solid var(--border); }
  .badge { display:inline-block; padding:.15rem .5rem; border-radius:4px; font-size:.75rem; font-weight:600; }
  .badge-primary { background:#dbeafe; color:#1d4ed8; }
  .badge-success { background:#dcfce7; color:#166534; }
  .badge-warn { background:#fef3c7; color:#92400e; }
  .badge-muted { background:var(--surface); color:var(--muted); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:.75rem; margin:.75rem 0; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:.75rem; }
  .card-title { font-weight:700; font-size:.9rem; margin-bottom:.25rem; }
  .card-meta { font-size:.8rem; color:var(--muted); }
  .bar { height:6px; border-radius:3px; background:var(--primary); margin-top:.3rem; }
  .stat-row { display:flex; gap:1.5rem; margin:.75rem 0; flex-wrap:wrap; }
  .stat { text-align:center; }
  .stat-num { font-size:1.5rem; font-weight:700; color:var(--primary); }
  .stat-label { font-size:.7rem; color:var(--muted); text-transform:uppercase; }
  .section { page-break-inside:avoid; margin-bottom:1.5rem; }
  .git-info { font-size:.8rem; color:var(--muted); margin-bottom:.5rem; }
  .git-info .branch { color:var(--success); font-weight:600; }
  .pkg-row { display:flex; flex-wrap:wrap; gap:.3rem; margin:.3rem 0; }
  .pkg { font-size:.75rem; padding:.15rem .4rem; background:var(--surface); border:1px solid var(--border); border-radius:3px; }
  .pkg-name { color:var(--primary); font-weight:600; }
  footer { margin-top:2rem; padding-top:1rem; border-top:1px solid var(--border); font-size:.75rem; color:var(--muted); text-align:center; }
</style>
</head>
<body>
{% block content %}{% endblock %}
<footer>Generated by <code>forktex arch</code> &mdash; {% block timestamp %}{{ generated_at }}{% endblock %}</footer>
</body>
</html>
